---
# Global defaults for all hosts
#
# These can be overridden in group-specific or host-specific vars

# Tailscale key - REQUIRED
# Best practice: use environment variable or Ansible Vault
# reefy_vm_tskey: "{{ lookup('env', 'REEFY_VM_TSKEY') }}"

# Default VM configuration
reefy_vm_vcpu: 2
reefy_vm_mem: "4G"
reefy_vm_image_size: "10G"

# Storage configuration
reefy_storage_mount: /mnt/reefy-data

# Networking configuration
reefy_bridge_name: br0

# Docker configuration
reefy_docker_image: reefy/svsm
reefy_docker_pull: missing  # Only pull if not present locally
