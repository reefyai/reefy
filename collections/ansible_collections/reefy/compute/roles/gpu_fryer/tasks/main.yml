---
# GPU Fryer role - runs GPU stress test

- name: Start GPU Fryer container
  community.docker.docker_container:
    name: "{{ reefy_gpu_fryer_container_name }}"
    image: "{{ reefy_gpu_fryer_image }}"
    state: started
    runtime: nvidia
    device_requests:
      - driver: nvidia
        count: -1
        capabilities:
          - - gpu
            - nvidia
    command: "{{ reefy_gpu_fryer_duration }}"
  register: gpu_fryer_result
  retries: 40
  delay: 15
  until: gpu_fryer_result is succeeded
  when: reefy_gpu_fryer_state == 'started'

- name: Stop GPU Fryer container
  community.docker.docker_container:
    name: "{{ reefy_gpu_fryer_container_name }}"
    state: absent
  when: reefy_gpu_fryer_state == 'absent'

- name: Display GPU Fryer status
  ansible.builtin.debug:
    msg: |
      GPU Fryer:
        Name: {{ reefy_gpu_fryer_container_name }}
        Duration: {{ reefy_gpu_fryer_duration }}s
        Image: {{ reefy_gpu_fryer_image }}
        Note: Container will exit automatically after stress test completes
  when: reefy_gpu_fryer_state == 'started'
