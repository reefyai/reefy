---
# Ollama role - runs Ollama inference server

- name: Ensure data directory exists
  ansible.builtin.file:
    path: "{{ reefy_ollama_data_path }}"
    state: directory
    mode: '0755'

- name: Create Docker network for Ollama
  community.docker.docker_network:
    name: "{{ reefy_ollama_network }}"
    state: present
  when:
    - reefy_ollama_state == 'started'
    - reefy_ollama_network | length > 0

- name: Start Ollama container (host network)
  community.docker.docker_container:
    name: "{{ reefy_ollama_container_name }}"
    image: "{{ reefy_ollama_image }}"
    state: "{{ reefy_ollama_state }}"
    runtime: nvidia
    network_mode: host
    pull: "{{ reefy_ollama_pull }}"
    recreate: "{{ reefy_ollama_recreate }}"
    restart_policy: unless-stopped
    volumes:
      - "{{ reefy_ollama_data_path }}:/root/.ollama"
    device_requests:
      - driver: nvidia
        count: -1
        capabilities:
          - - gpu
            - nvidia
  register: container_result
  retries: 40
  delay: 15
  until: container_result is succeeded
  when:
    - reefy_ollama_state == 'started'
    - reefy_ollama_network | length == 0

- name: Start Ollama container (custom network)
  community.docker.docker_container:
    name: "{{ reefy_ollama_container_name }}"
    image: "{{ reefy_ollama_image }}"
    state: "{{ reefy_ollama_state }}"
    runtime: nvidia
    networks:
      - name: "{{ reefy_ollama_network }}"
    ports:
      - "{{ reefy_ollama_port }}:11434"
    pull: "{{ reefy_ollama_pull }}"
    recreate: "{{ reefy_ollama_recreate }}"
    restart_policy: unless-stopped
    volumes:
      - "{{ reefy_ollama_data_path }}:/root/.ollama"
    device_requests:
      - driver: nvidia
        count: -1
        capabilities:
          - - gpu
            - nvidia
  register: container_result
  retries: 40
  delay: 15
  until: container_result is succeeded
  when:
    - reefy_ollama_state == 'started'
    - reefy_ollama_network | length > 0

- name: Wait for Ollama to be ready
  ansible.builtin.uri:
    url: "http://localhost:11434/api/tags"
    method: GET
  register: ollama_health
  retries: 30
  delay: 2
  until: ollama_health.status == 200
  when: reefy_ollama_state == 'started' and reefy_ollama_models | length > 0

- name: Pull Ollama models
  ansible.builtin.command:
    cmd: "docker exec {{ reefy_ollama_container_name }} ollama pull {{ item }}"
  loop: "{{ reefy_ollama_models }}"
  register: pull_result
  retries: 3
  delay: 5
  until: pull_result is succeeded
  when: reefy_ollama_state == 'started' and reefy_ollama_models | length > 0

- name: Stop Ollama container
  community.docker.docker_container:
    name: "{{ reefy_ollama_container_name }}"
    state: absent
  when: reefy_ollama_state == 'absent'

- name: Display Ollama status
  ansible.builtin.debug:
    msg: |
      Ollama Container:
        Name: {{ reefy_ollama_container_name }}
        State: {{ reefy_ollama_state }}
        Image: {{ reefy_ollama_image }}
        Network: {{ reefy_ollama_network | default('host', true) }}
        Models: {{ reefy_ollama_models | join(', ') | default('none') }}
  when: reefy_ollama_state == 'started'
