---
# vLLM role defaults

# Container configuration
reefy_vllm_container_name: vllm
# v0.15.1 supports Blackwell (sm_120) with driver 590 (CUDA 13.1)
# Uses LD_LIBRARY_PATH fix to prefer host libcuda over container cuda-compat
reefy_vllm_image: vllm/vllm-openai:v0.15.1
reefy_vllm_state: started
reefy_vllm_pull: false  # Only pull when explicitly needed
reefy_vllm_recreate: false

# Ports
reefy_vllm_ports:
  - "8000:8000"

# Storage paths
reefy_vllm_cache_path: /mnt/reefy-data/huggingface
reefy_vllm_data_path: /mnt/reefy-data/src

# HuggingFace token (required for gated models)
# reefy_vllm_hf_token: "hf_xxx"
reefy_vllm_require_hf_token: false

# Model to serve
reefy_vllm_model: "Qwen/Qwen3-0.6B"

# Enforce eager mode (disable CUDA graphs) - helps with compatibility
# Set to false to enable CUDA graphs for potentially better performance
reefy_vllm_enforce_eager: true

# vLLM extra arguments (appended to default command)
# Example: "--max-model-len 4096 --tensor-parallel-size 2"
reefy_vllm_extra_args: ""
