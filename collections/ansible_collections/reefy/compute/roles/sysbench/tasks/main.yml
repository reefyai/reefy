---
- name: Start CPU stress test with sysbench
  docker_container:
    name: sysbench
    image: perconalab/sysbench
    state: "{{ 'started' if reefy_sysbench_state == 'present' else 'absent' }}"
    command: >
      /usr/bin/sysbench --time={{ reefy_sysbench_time }} --threads={{ reefy_sysbench_threads }} cpu run
  when: reefy_sysbench_state == "present"

- name: Stop sysbench container
  docker_container:
    name: sysbench
    state: absent
  when: reefy_sysbench_state == "absent"
