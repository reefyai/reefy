---
# VM role defaults
# This role orchestrates storage, networking, docker, and VM creation

# =============================================================================
# Feature Flags - control which components are configured
# =============================================================================
reefy_configure_storage: true
reefy_configure_networking: true
reefy_configure_docker: true

# =============================================================================
# Storage Configuration (passed to storage role)
# =============================================================================
reefy_storage_mount: /mnt/reefy-data
reefy_vg_name: reefy-vg
reefy_lv_name: reefy-lv

# =============================================================================
# Networking Configuration (passed to networking role)
# =============================================================================
reefy_bridge_name: br0

# =============================================================================
# Docker Configuration (passed to docker role)
# =============================================================================
reefy_docker_image: reefy/svsm
reefy_docker_pull: missing  # Only pull if not present locally

# =============================================================================
# VM Configuration
# =============================================================================
# VM naming - if not set, generates random name like "reefy-vm-a1b2c3d4"
# reefy_vm_name: my-custom-vm-name

# VM state: present, absent, started, stopped
reefy_vm_state: present

# Compute resources
# Set to "max" to auto-calculate: total vCPUs - 2 (reserves 2 for hypervisor)
reefy_vm_vcpu: 2
# Set to "max" to auto-calculate: total memory - 2GB (reserves 2GB for hypervisor)
reefy_vm_mem: "4G"

# Storage
reefy_vm_image_size: "10G"
reefy_vm_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"

# Optional data disk (set name to enable)
# reefy_vm_data_disk_name: "my-data"
# reefy_vm_data_disk_size: "100G"

# GPU and PCIe passthrough
# Set to true or "auto" to attach all GPUs, or provide list of PCI addresses
reefy_vm_attach_gpus: true
reefy_vm_attach_pcie_devices: []

# Confidential computing (AMD SEV-SNP)
reefy_vm_confidential_computing: false

# Persist boot disk (keeps changes across restarts, not deleted on remove)
reefy_vm_persist_boot_image: true

# =============================================================================
# Tailscale Configuration
# =============================================================================
# REQUIRED - must be provided via group_vars, host_vars, or extra vars
# reefy_vm_tskey: "tskey-auth-xxxxx"

# Tailscale tags to advertise (must be pre-authorized in ACL policy)
reefy_vm_tailscale_tags: "tag:reefy"

# =============================================================================
# Console Access
# =============================================================================
# Optional root password for console access (useful when Tailscale unavailable)
# reefy_vm_root_password: "your-password"

# =============================================================================
# QEMU Configuration
# =============================================================================
# Use standard Ubuntu QEMU instead of SVSM build (for debugging)
reefy_vm_use_standard_qemu: false

# Disable KVM and use TCG software emulation (very slow, for debugging)
reefy_vm_disable_kvm: false

# Preallocate all VM memory at startup (for debugging memory issues)
reefy_vm_mem_prealloc: false

# Custom commands to run on first boot (appended to cloud-init runcmd)
# Runs after Tailscale is configured but still during cloud-init first boot.
# Example: ["sysctl -w net.ipv4.tcp_window_scaling=0", "apt-get install -y htop"]
reefy_vm_runcmd: []
