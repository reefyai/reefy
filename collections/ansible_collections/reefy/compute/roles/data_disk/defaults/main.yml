---
# Data disk role defaults

# Block device for LUKS container
reefy_data_disk_device: /dev/sdb

# LUKS mapper name
reefy_data_disk_mapper_name: reefy-data

# Mount path
reefy_data_disk_mount_path: /mnt/reefy-data

# Format disk if needed (creates ext4 filesystem)
reefy_data_disk_format: true

# REQUIRED - must be provided
# reefy_data_disk_passphrase: "your-luks-passphrase"
