---
# Example playbook to start an Reefy VM
#
# Usage:
#   ansible-playbook reefy.compute.start-vm -i inventory/hosts.yml -e reefy_vm_tskey=tskey-auth-xxx
#
# Or with specific host:
#   ansible-playbook reefy.compute.start-vm -i inventory/hosts.yml -l worker-01 -e reefy_vm_tskey=tskey-auth-xxx
#
# Preview changes (dry run):
#   ansible-playbook reefy.compute.start-vm -i inventory/hosts.yml --check --diff

- name: Start Reefy VM
  hosts: "{{ target_hosts | default('all') }}"
  gather_facts: false

  collections:
    - reefy.compute

  roles:
    - role: reefy.compute.vm
