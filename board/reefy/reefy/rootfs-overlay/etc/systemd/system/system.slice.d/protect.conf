[Slice]
# Soft guarantee: kernel always keeps 1.5GB available for system services
# (kernel, dockerd, reefy-mqtt, SSH, watchdog, journald, etc.). Under
# memory pressure, kernel preferentially reclaims from other slices
# (docker.slice — containers) to free this much for system.slice.
#
# Containers can still use ALL available RAM when host doesn't need it.
# Only kicks in under contention. Prevents host service starvation
# during container memory storms.
MemoryMin=1.5G
